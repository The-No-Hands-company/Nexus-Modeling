name: Nexus Systems CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── TypeScript / Bun apps (Bun.serve + SQLite engines) ─────────────
  bun-apps:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - Nexus-Academy
          - Nexus-Arcade
          - Nexus-Auth
          - Nexus-Billing
          - Nexus-Book
          - Nexus-Calendar
          - Nexus-Code-Review
          - Nexus-Compliance
          - Nexus-Content
          - Nexus-Design
          - Nexus-Draw
          - Nexus-Edge
          - Nexus-Finance
          - Nexus-Graphic
          - Nexus-Health
          - Nexus-Home
          - Nexus-HR
          - Nexus-IDE
          - Nexus-Inference
          - Nexus-Insights
          - Nexus-Learn
          - Nexus-Market
          - Nexus-Media
          - Nexus-Meet
          - Nexus-Mind
          - Nexus-Monitor
          - Nexus-Music
          - Nexus-Notes
          - Nexus-Nutrition
          - Nexus-Office
          - Nexus-PDF
          - Nexus-Photos
          - Nexus-Planner
          - Nexus-Play
          - Nexus-Presence
          - Nexus-Provenance
          - Nexus-Radio-Live
          - Nexus-Review
          - Nexus-Sales
          - Nexus-Search
          - Nexus-SEO
          - Nexus-Social
          - Nexus-Spend
          - Nexus-Store
          - Nexus-Survey
          - Nexus-Tasks
          - Nexus-Team-Chat
          - Nexus-Terminal
          - Nexus-Tunnel
          - Nexus-Tutor
          - Nexus-Vertical
          - Nexus-Video
          - Nexus-Warehouse
          - Nexus-Wiki
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: cd apps/${{ matrix.app }} && bun install --frozen-lockfile || bun install
      - name: Typecheck
        run: cd apps/${{ matrix.app }} && bunx tsc --noEmit
      - name: Test
        run: cd apps/${{ matrix.app }} && bun test
        env:
          NEXUS_${{ matrix.app }}_ENABLE_CLOUD_INTEGRATION: "false"

  # ── Nexus-Cloud (control plane) ──────────────────────────────────
  nexus-cloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: cd apps/Nexus-Cloud && bun install --frozen-lockfile || bun install
      - name: Typecheck
        run: cd apps/Nexus-Cloud && bunx tsc --noEmit
      - name: Test
        run: cd apps/Nexus-Cloud && bun test src
        env:
          NEXUS_CLOUD_API_KEY: change-me

  # ── Rust WASM engines ───────────────────────────────────────────
  rust-engines:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - Nexus-Design
          - Nexus-Draw
          - Nexus-Graphic
          - Nexus-Photos
          - Nexus-Video
          - Nexus-GPU-Test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cd apps/${{ matrix.app }}/engine && cargo check
      - name: Test
        run: cd apps/${{ matrix.app }}/engine && cargo test

  # ── React frontends ──────────────────────────────────────────────
  frontends:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - Nexus-Design
          - Nexus-Draw
          - Nexus-Graphic
          - Nexus-Photos
          - Nexus-Video
          - Nexus-GPU-Test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
      - name: Install deps
        run: cd apps/${{ matrix.app }}/frontend && npm install
      - name: Typecheck
        run: cd apps/${{ matrix.app }}/frontend && npx tsc --noEmit
      - name: Build
        run: cd apps/${{ matrix.app }}/frontend && npx vite build

  # ── Ecosystem integration smoke test ─────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: [bun-apps, nexus-cloud]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Start Nexus-Cloud
        run: |
          cd apps/Nexus-Cloud
          bun run src/index.ts &
          sleep 5
          curl -s http://localhost:8787/health | grep '"status":"ok"'
      - name: Test app registration
        run: |
          for app in Nexus-Graphic Nexus-Design Nexus-Draw Nexus-Photos Nexus-Video; do
            port=3080
            case "$app" in
              Nexus-Graphic) port=3080 ;;
              Nexus-Design)  port=3081 ;;
              Nexus-Draw)    port=3082 ;;
              Nexus-Photos)  port=3083 ;;
              Nexus-Video)   port=3084 ;;
            esac
            export PORT=$port
            cd apps/$app
            bun run src/index.ts &
            sleep 3
            curl -s "http://localhost:$port/health" | grep '"status":"ok"' && echo "$app: OK" || echo "$app: FAIL"
            cd ../..
          done
