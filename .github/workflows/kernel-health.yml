name: Kernel Health

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Guard test binaries before ctest
        run: |
          if [[ ! -x build/tests/nexus_kernel_tests ]]; then
            echo "ERROR: missing test binary build/tests/nexus_kernel_tests after build." >&2
            echo "Run cmake --build build -j\$(nproc) and verify the tests target links successfully." >&2
            exit 1
          fi
          if [[ ! -x build/tests/nexus_kernel_perf_smoke ]]; then
            echo "ERROR: missing perf smoke binary build/tests/nexus_kernel_perf_smoke after build." >&2
            echo "Run cmake --build build -j\$(nproc) and verify the perf smoke target links successfully." >&2
            exit 1
          fi

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Perf smoke
        run: ./build/tests/nexus_kernel_perf_smoke --frames 120 --output build/kernel_perf_smoke.txt

      - name: Lifetime report
        run: ctest --test-dir build --output-on-failure -R "(Lifecycle|Resize|Destroy|ResetScene)" | tee build/kernel_lifetime_report.txt

      - name: Upload kernel health artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-health-artifacts
          path: |
            build/kernel_perf_smoke.txt
            build/kernel_lifetime_report.txt