# ── Volumes ─────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# ── Network ─────────────────────────────────────────────────────

networks:
  nexus-net:
    driver: bridge
    name: nexus-net
