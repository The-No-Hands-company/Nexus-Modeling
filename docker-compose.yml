# Nexus Systems Ecosystem — Production Docker Compose
# Infrastructure + Nexus-Cloud + 5 Graphics Apps

services:
  # ── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
      POSTGRES_INITDB_ARGS: --data-checksums
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - nexus-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory-policy allkeys-lru --maxmemory 256mb
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nexus-net

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER_REDIRECT_URL: ""
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - nexus-net

  # ── Nexus-Cloud — Control Plane ─────────────────────────────────

  nexus-cloud:
    build:
      context: ./apps/Nexus-Cloud
      dockerfile_inline: |
        FROM oven/bun:1
        WORKDIR /app
        COPY package.json ./
        RUN bun install --production --frozen-lockfile 2>/dev/null || bun install --production
        COPY . .
        EXPOSE 8787
        HEALTHCHECK --interval=15s --timeout=5s --retries=3 --start-period=10s \
          CMD bun -e "fetch('http://localhost:8787/health').then(r=>{if(!r.ok)process.exit(1)})"
        CMD ["bun", "run", "src/index.ts"]
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      PORT: "8787"
      NEXUS_CLOUD_API_KEY: change-me
      NEXUS_CLOUD_URL: http://nexus-cloud:8787
      CORS_ORIGIN: "*"
      POSTGRES_URL: postgresql://nexus:nexus@postgres:5432/nexus
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: nexus
      NEXUS_CLOUD_DOMAIN: nexus.local
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./data:/data
    networks:
      - nexus-net

  # ── Graphics Apps ───────────────────────────────────────────────

  nexus-graphic:
    build:
      context: ./apps/Nexus-Graphic
      dockerfile_inline: |
        FROM oven/bun:1
        WORKDIR /app
        COPY package.json ./
        RUN bun install --production --frozen-lockfile 2>/dev/null || bun install --production
        COPY . .
        EXPOSE 3080
        HEALTHCHECK --interval=15s --timeout=5s --retries=3 --start-period=10s \
          CMD bun -e "fetch('http://localhost:3080/health').then(r=>{if(!r.ok)process.exit(1)})"
        CMD ["bun", "run", "src/index.ts"]
    restart: unless-stopped
    ports:
      - "3080:3080"
    environment:
      PORT: "3080"
      NEXUS_CLOUD_URL: http://nexus-cloud:8787
      NEXUS_CLOUD_API_KEY: change-me
      NEXUS_GRAPHIC_ENABLE_CLOUD_INTEGRATION: "true"
      NEXUS_NEXUS_GRAPHIC_BASE_URL: http://nexus-graphic:3080
      CORS_ORIGIN: "*"
      NODE_ENV: production
    volumes:
      - ./data:/data
    depends_on:
      nexus-cloud:
        condition: service_healthy
    networks:
      - nexus-net

  nexus-design:
